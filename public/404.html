<!doctype html>
<html>

<head>
	<meta charset="utf-8" />
	<meta http-equiv="refresh" content="0; url=/walk-like-local-front/" />
	<script>
		// Fallback for SPA routing: redirect to index.html
		(function () {
			var path = location.pathname + location.search + location.hash;
			var base = '/walk-like-local-front/';
			if (!location.pathname.startsWith(base)) {
				location.replace(base + '?p=' + encodeURIComponent(path));
			} else {
				location.replace(base);
			}
		})();
	</script>
	<title>Redirecting…</title>
</head>

<body>
	Redirecting to the app…
</body>

</html>
